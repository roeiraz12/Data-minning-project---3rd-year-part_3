<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Movie Predictor</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #fdfcf0 0%, #fff9c4 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .container { background: rgba(255, 255, 255, 0.9); padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 700px; backdrop-filter: blur(10px); }
        h1 { text-align: center; color: #2c3e50; margin-bottom: 30px; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 8px; box-sizing: border-box; }
        .info { font-size: 0.8em; color: #6c757d; cursor: help; }
        button { width: 100%; padding: 14px; background: #28a745; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; }
        #result { margin-top: 25px; text-align: center; font-size: 28px; font-weight: 300; color: #34495e; display: none; }
        .spinner { width: 40px; height: 40px; border: 5px solid #f3f3f3; border-top: 5px solid #fbc02d; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 20px auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div class="container">
    <h1>Movie Predictor</h1>
    <form id="predictForm">
        <div class="row">
            <div class="form-group"><label>שנה (1900-2026)</label><input type="number" id="startYear" placeholder="2024" required></div>
            <div class="form-group"><label>אורך (1-300 דקות)</label><input type="number" id="runtimeMinutes" placeholder="120" required></div>
        </div>
        <div class="row">
            <div class="form-group"><label>תקציב</label><input type="number" id="budget" placeholder="5000000"></div>
            <div class="form-group"><label>שפה</label><input type="text" id="Language" placeholder="English" required></div>
        </div>
        <div class="row">
            <div class="form-group"><label>מדינה</label><input type="text" id="Country" placeholder="USA" required></div>
            <div class="form-group"><label>כותבים (עד 2) <span class="info" title='["mn0000001","mn0000002"]'>ⓘ</span></label><input type="text" id="writer_1" placeholder="mn0000001" required></div>
        </div>
        <div class="row">
            <div class="form-group"><label>שחקנים (עד 5) <span class="info" title='["mn0000001"]'>ⓘ</span></label><input type="text" id="actor_1" placeholder="mn0000001" required></div>
            <div class="form-group"><label>ז'אנרים (עד 3) <span class="info" title='["Action","Drama"]'>ⓘ</span></label><input type="text" id="genre_1" placeholder="Action" required></div>
        </div>
        <button type="submit">Predict</button>
    </form>
    <div class="spinner" id="loader"></div>
    <div id="result"></div>
</div>
<script>
    document.getElementById('predictForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const resDiv = document.getElementById('result');
        const loader = document.getElementById('loader');
        loader.style.display = 'block';
        resDiv.style.display = 'none';
        
        const payload = {
            startYear: document.getElementById('startYear').value,
            runtimeMinutes: document.getElementById('runtimeMinutes').value,
            budget: document.getElementById('budget').value || 0,
            Language: document.getElementById('Language').value,
            Country: document.getElementById('Country').value,
            actor_1: document.getElementById('actor_1').value,
            writer_1: document.getElementById('writer_1').value,
            genre_1: document.getElementById('genre_1').value
        };
        
        const response = await fetch('/predict', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        const data = await response.json();
        loader.style.display = 'none';
        
        if (response.ok) {
            const rating = data.predicted_rating;
            let emoji = rating < 6 ? '😞' : (rating <= 8 ? '👏' : '🎉');
            resDiv.innerHTML = `Predicted rating: ${rating} / 10 ${emoji}`;
            resDiv.style.display = 'block';
        } else {
            resDiv.innerHTML = `<div style="color:red">שגיאה: ${data.error}</div>`;
            resDiv.style.display = 'block';
        }
    });
</script>
</body>
</html>
